services:
  app:
    image: ghcr.io/karakeep-app/karakeep:${HOARDER_VERSION:-release}
    restart: unless-stopped
    volumes:
      - data:/data
    env_file:
      - openai.env
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      OPENAI_BASE_URL: https://openrouter.ai/api/v1
      INFERENCE_TEXT_MODEL: openai/gpt-oss-20b:free
      INFERENCE_IMAGE_MODEL: google/gemma-3-12b-it:free
      INFERENCE_CONTEXT_LENGTH: 2048
      INFERENCE_JOB_TIMEOUT_SEC: 300
      CRAWLER_FULL_PAGE_SCREENSHOT: true
      OCR_LANGS: eng, chi_tra, chi_sim
      DATA_DIR: /data
      DISABLE_SIGNUPS: false
    depends_on: 
      - meilisearch
    
  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  meilisearch:
    image: getmeili/meilisearch:v1.13.3
    restart: unless-stopped
    env_file:
      - karakeep.env
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch:/meili_data

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

  tunnel:
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_EDGE_IP_VERSION=auto
    env_file:
      - cloudflared.env

volumes:
  meilisearch:
  data:
