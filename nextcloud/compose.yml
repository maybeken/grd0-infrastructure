services:
  db:
    image: docker.io/library/postgres:17-alpine
    restart: always
    volumes:
      - db:/var/lib/postgresql/data:z
    env_file:
      - db.env

  redis:
    image: valkey/valkey:alpine
    restart: always

  app:
    image: grd0.net/nextcloud:fpm-alpine
    build:
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - redis
      - db
      - smtp
    volumes:
      - nextcloud:/var/www/html:z
      - /mnt/nextcloud-data/config:/var/www/html/config
      - /mnt/nextcloud-data/data:/var/www/html/data
      - /mnt/nextcloud-data/themes:/var/www/html/themes
      - /mnt/nextcloud-data/custom_apps:/var/www/html/custom_apps
      - ./php-fpm/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES}
      - SMTP_HOST=smtp
      - SMTP_PORT=2525
      - PHP_MEMORY_LIMIT=1024M
      - PHP_UPLOAD_LIMIT=1024M
      - PHP_OPCACHE_MEMORY_CONSUMPTION=512M
    env_file:
      - db.env

  collabora:
    image: collabora/code
    restart: always
    environment:
      - domain=docs.grd0.net
      - server_name=docs.grd0.net
      - dictionaries=en,zh

  whiteboard:
    image: ghcr.io/nextcloud-releases/whiteboard:stable
    environment:
      STORAGE_STRATEGY: lru
      MAX_UPLOAD_FILE_SIZE: 10
    env_file:
      - whiteboard.env

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - nextcloud:/var/www/html:z,ro
      - ./Caddyfile:/etc/caddy/Caddyfile
    volumes_from:
      - app

  cron:
    image: grd0.net/nextcloud:fpm-alpine
    build:
      dockerfile: Dockerfile
    restart: always
    volumes:
      - nextcloud:/var/www/html:z
      - /mnt/nextcloud-data/config:/var/www/html/config
      - /mnt/nextcloud-data/data:/var/www/html/data
      - /mnt/nextcloud-data/themes:/var/www/html/themes
      - /mnt/nextcloud-data/custom_apps:/var/www/html/custom_apps
      # NOTE: The `volumes` config of the `cron` and `app` containers must match
    environment:
      - PHP_MEMORY_LIMIT=1024M
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis

  tunnel:
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_EDGE_IP_VERSION=auto
    env_file:
      - cloudflared.env
  
  smtp:
    image: kostyaesmukov/smtp_to_telegram
    restart: always
    environment:
      - "Subject: {subject}\\n\\n{body}\\n\\n{attachments_details}"
    env_file:
      - smtp.env

volumes:
  nextcloud:
  db:

networks:
  default:
    enable_ipv6: true