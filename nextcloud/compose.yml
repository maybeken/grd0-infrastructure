services:
  db:
    image: docker.io/library/postgres:17-alpine
    restart: always
    volumes:
      - db:/var/lib/postgresql/data:z
    env_file:
      - db.env

  redis:
    image: docker.io/valkey/valkey:alpine
    restart: always

  app:
    image: grd0.net/nextcloud:fpm-alpine
    build:
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - redis
      - db
      - smtp
    volumes:
      - nextcloud:/var/www/html:z
      - /home/cloud/storage/nextcloud/config:/var/www/html/config:z
      - /home/cloud/storage/nextcloud/custom_apps:/var/www/html/custom_apps:z
      - /home/cloud/storage/nextcloud/data:/var/www/html/data:z
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES}
      - SMTP_HOST=smtp
      - SMTP_PORT=2525
    env_file:
      - db.env

  collabora:
    image: docker.io/collabora/code
    restart: always
    environment:
      - domain=docs.grd0.net
      - server_name=docs.grd0.net
      - dictionaries=en,zh

  caddy:
    image: ghcr.io/tailscale/caddy-tailscale:main
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - nextcloud:/var/www/html:z,ro
      - ./Caddyfile:/etc/caddy/Caddyfile
    volumes_from:
      - app
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}

  cron:
    image: grd0.net/nextcloud:fpm-alpine
    build:
      dockerfile: Dockerfile
    restart: always
    volumes:
      - nextcloud:/var/www/html:z
      - /home/cloud/storage/nextcloud/config:/var/www/html/config:z
      - /home/cloud/storage/nextcloud/custom_apps:/var/www/html/custom_apps:z
      - /home/cloud/storage/nextcloud/data:/var/www/html/data:z
      # NOTE: The `volumes` config of the `cron` and `app` containers must match
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis

  smtp:
    image: docker.io/kostyaesmukov/smtp_to_telegram
    restart: always
    environment:
      - "Subject: {subject}\\n\\n{body}\\n\\n{attachments_details}"
    env_file:
      - smtp.env

volumes:
  nextcloud:
  db:

networks:
  default:
    enable_ipv6: true